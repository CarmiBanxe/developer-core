[OpenAI]
; Use local Ollama via OpenAI-compatible API
api_type = openai
model = qwen3:8b
reasoning_model = qwen3:8b
embedding_model = text-embedding-3-small
max_completion_tokens = 4096
timeout = 120
max_attempts = 3
waiting_time = 1
exponential_backoff_factor = 2
max_concurrent_model_calls = 1
cache_api_calls = False
cache_file_name = tinytroupe_cache.json
max_content_display_length = 2000

; Ollama OpenAI-compatible endpoint
OPENAI_API_KEY = ollama
OPENAI_API_BASE = http://localhost:11434/v1

[Simulation]
parallel_agent_generation = False
parallel_agent_actions = False
rai_harmful_content_prevention = True
rai_copyright_infringement_prevention = True

[Cognition]
enable_memory_consolidation = False
enable_continuous_contextual_semantic_memory_retrieval = False
; Disable embeddings to avoid OpenAI embedding calls

min_episode_length = 3
max_episode_length = 7
episodic_memory_fixed_prefix_length = 3
episodic_memory_lookback_length = 5

[ActionGenerator]
max_attempts = 2
enable_quality_checks = False
enable_regeneration = False
enable_direct_correction = False
continue_on_failure = True
quality_threshold = 5

[Logging]
loglevel = ERROR
loglevel_console = WARNING
loglevel_file = ERROR
log_include_thread_id = False
